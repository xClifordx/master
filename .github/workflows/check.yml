name: Check Channels
on:
  schedule:
    - cron: '0 */6 * * *' 
  workflow_dispatch:      

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with: {python-version: '3.9'}
      - name: Install dependencies
        run: pip install grequests
      - name: Run checker
        run: python check_channels.py
      - name: Commit changes
        run: |
          git config user.name "Bot"
          git config user.email "bot@github.com"
          git add IPSACL.m3u
          git commit -m "Update channel status" || exit 0
          git push
