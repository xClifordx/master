name: Validador

on:
  schedule:
    - cron: '0 8 * * *' 
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validar_enlaces:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar librerías
      run: pip install requests

    - name: Ejecutar script validador
      run: python validador.py

    - name: Guardar cambios en el M3U
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add *.m3u
        git commit -m "Automático: Actualización de status online/offline" || echo "Sin cambios"
        git push
